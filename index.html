<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">
    <title>لعبة المافيا</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
    <div class="loader-content">
        <h1 class="pulse">🕵️‍♂️</h1>
        <p>جاري تحضير العصابة...</p>
    </div>
</div>
    <div class="main-card">
        <h1>🕵️‍♂️ لعبة المافيا</h1>

        <div id="setup-section">
            <input type="text" id="playerName" placeholder="اكتب اسمك هون...">
            <button id="createRoomBtn" class="btn-primary">أنشئ غرفة جديدة</button>
            <p>أو</p>
            <input type="text" id="roomCodeInput" placeholder="دخل رمز الغرفة...">
            <button id="joinRoomBtn" class="btn-secondary">انضم للغرفة</button>
        </div>

        <div id="lobby-section" style="display: none;">
            <h3>رمز الغرفة: <span id="displayRoomCode" style="color: #ff3366;">----</span></h3>
            <hr style="margin: 15px 0; border: 0.5px solid #444;">
            <h4>اللاعبون المتصلون:</h4>
            <ul id="playersList" style="list-style: none; padding: 0; margin: 15px 0; text-align: right;">
                </ul>
            <button id="startGameBtn" class="btn-primary" style="background: #28a745; display: none;">بدء اللعبة! 🚀</button>
            <p style="font-size: 0.8rem; color: #888;">بانتظار دخول باقي اللاعبين...</p>
            <button id="startVotingBtn" class="btn-secondary" style="background: #ffc107; color: #000; display: none; margin-top: 10px;">بدء التصويت الآن 🗳️</button>
        </div>
        <div id="voting-section" style="display: none;">
    <h2 style="color: #ff3366;">وقت المحاكمة ⚖️</h2>
    <p style="color: #888; margin-bottom: 20px;">صوّت للشخص اللي بتشك إنه مافيا</p>
    <div id="votingList" class="voting-grid"></div>
    <div id="voteStatus" style="margin-top: 20px; color: var(--secondary); font-weight: bold;"></div>
    <button id="endVotingBtn" class="btn-primary" style="background: #dc3545; display: none; margin-top: 20px;">إنهاء التصويت وإعلان النتيجة 📢</button>
    <div id="finalResult" class="role-card" style="display: none;"></div>
</div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
